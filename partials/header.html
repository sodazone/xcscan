  class="relative mx-auto flex w-full max-w-screen-xl mb-2 md:mb-6 md:items-center md:space-x-12 px-4 py-4"
>

    <div class="flex gap-2 items-center">
      <svg
        width="24"
        height="24"
        viewBox="0 0 256 256"
        fill="white"
        xmlns="http://www.w3.org/2000/svg"
        class="w-8 h-8 flex-shrink-0"
        aria-hidden="true"
      >
        <path
          d="M31.0155 57.7181C14.6547 76.7768 14.2233 103.306 30.0862 116.92C45.9492 130.566 72.0667 126.15 88.4607 107.058C104.821 87.9995 105.253 61.4701 89.3899 47.8567C83.1841 42.511 75.3522 39.9543 67.1884 39.9543C54.5113 39.9543 40.9713 46.1302 31.0155 57.7181Z"

        ></path>
        <path
          d="M137.343 209.789C115.142 216.795 99.8429 231.072 103.161 241.664C106.513 252.256 127.221 255.178 149.423 248.139C171.625 241.133 186.923 226.856 183.605 216.264C181.481 209.59 172.454 205.938 160.507 205.938C153.505 205.938 145.54 207.166 137.343 209.756"
          class="fill-grey-100"
        ></path>
        <path
          d="M102.597 18.5365C98.0176 31.7514 112.553 48.8179 135.12 56.6871C157.686 64.5562 179.689 60.2066 184.268 46.9917C188.848 33.7768 174.313 16.7103 151.746 8.84109C144.146 6.18482 136.58 4.9231 129.744 4.9231C116.303 4.9231 105.617 9.77078 102.597 18.5365Z"
          class="fill-grey-100"
        ></path>
        <path
          d="M204.048 45.169C197.51 47.7921 199.07 66.884 207.499 87.7357C215.928 108.621 228.041 123.396 234.579 120.773C241.083 118.15 239.557 99.0912 231.128 78.2063C223.362 58.9484 212.444 44.8702 205.674 44.8702C205.11 44.8702 204.579 44.9698 204.048 45.169Z"
          class="fill-grey-100"
        ></path>
        <path
          d="M209.058 172.038C199.766 192.192 196.547 210.553 201.89 213.01C207.233 215.468 219.114 201.124 228.406 180.969C237.731 160.815 240.917 142.453 235.607 139.996C235.209 139.797 234.778 139.731 234.28 139.731C228.472 139.731 217.654 153.411 209.058 172.038Z"
          class="fill-grey-100"
        ></path>
      </svg>
      <div class="flex flex-col space-y-0 text-sm font-semibold">
        <span class="text-white/80 uppercase text-xs tracking-wider"
          >xcscan</span
        >
        <span class="text-white/50">explorer</span>
      </div>
    </div>
  </a>

  <!-- Desktop Nav -->
  <nav class="hidden md:flex gap-4 text-xs text-white/40">
    <a
      class="<%= currentPage === 'home' || currentPage === 'tx' ? 'text-white/80' : 'hover:text-white/80' %>"
      href="/"
    >
      CROSSCHAIN
    </a>
    <a
      class="<%= currentPage === 'intrachain' ? 'text-white/80' : 'hover:text-white/80' %>"
      href="/intrachain/index.html"
    >
      INTRACHAIN
    </a>
    <a
      class="<%= currentPage === 'analytics' || currentPage === 'network' ? 'text-white/80' : 'hover:text-white/80' %>"
      href="/analytics/index.html"
    >
      ANALYTICS
    </a>
  </nav>

  <!-- Burger Icon -->
  <button
    id="mobile-menu-burger"
    class="md:hidden flex flex-col space-y-1.5 ml-auto justify-center items-end"
  >
    <span
      class="block w-6 h-0.5 bg-white/80 rounded-sm transition-all duration-200"
    ></span>
    <span
      class="block w-4 h-0.5 bg-white/80 rounded-sm transition-all duration-200"
    ></span>
  </button>

  <!-- Fullscreen Mobile Menu -->
  <div
    id="mobile-menu-overlay"
    class="fixed z-50 inset-0 bg-black/60 text-white/80 backdrop-blur-lg transform translate-x-full transition-transform duration-300 ease-in-out md:hidden"
  >
    <button
      id="mobile-menu-close"
      class="absolute top-4 right-4 text-4xl text-white/60 focus:text-white focus:outline-none"
    >
      &times;
    </button>
    <div
      id="mobile-menu"
      class="flex flex-col items-center space-y-8 mt-24 px-6 text-xl"
    >
      <a href="/" class="focus:text-white menu-link" onclick="toggleMenu()"
        >Crosschain</a
      >
      <a
        href="/intrachain/index.html"
        class="focus:text-white menu-link"
        onclick="toggleMenu()"
        >Intrachain</a
      >
      <a
        href="/analytics/index.html"
        class="focus:text-white menu-link"
        onclick="toggleMenu()"
        >Analytics</a
      >
    </div>
  </div>
</header>
